name: ci

on:
  push:
    branches: [main]
  pull_request:

jobs:
  unit:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        node: [18, 20, 22]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm
      - run: npm ci
      - run: npx tsc --noEmit
      - run: npx vitest run --exclude 'test/integration/**' test
      - run: npm run build

  spec-vectors:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: freshworkstudio/kilden-sdk-spec
          path: spec
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: "1.24"
          cache-dependency-path: spec/mockserver/go.mod
      - run: npm ci
      - run: npm run check
        env:
          KILDEN_SPEC_DIR: ${{ github.workspace }}/spec
