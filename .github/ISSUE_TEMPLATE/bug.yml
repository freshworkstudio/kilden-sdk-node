name: Bug report
description: Something misbehaves, or diverges from kilden-sdk-spec
labels: [bug]
body:
  - type: input
    id: version
    attributes:
      label: SDK version and Node version
      placeholder: "@kilden-io/node 0.1.0-alpha.1, Node 22.1"
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened
      description: If this is a divergence from the spec or another Kilden SDK, say which — those reports are gold.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Minimal reproduction
      render: typescript
